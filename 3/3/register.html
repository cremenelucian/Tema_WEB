<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="light">
    <div class="container">
      <header>
        <h1>Înregistrare</h1>
        <nav>
          <a href="index.html">Acasă</a>
          <a href="preferences.html">Preferințe</a>
          <a href="cookies-info.html">Cookies info</a>
          <a href="login.html">Autentificare</a>
        </nav>
      </header>

      <section class="card">
        <form id="registerForm" novalidate>
          <label for="username">Username (minim 3 caractere)</label>
          <input id="username" name="username" autocomplete="username" />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" />

          <label for="password">Parolă (minim 6 caractere)</label>
          <input id="password" name="password" type="password" autocomplete="new-password" />

          <label for="confirm">Confirmare parolă</label>
          <input id="confirm" name="confirm" type="password" autocomplete="new-password" />

          <div class="actions">
            <button class="btn" type="submit">Creează cont</button>
            <a class="btn btn-secondary" href="login.html" style="text-decoration: none">Înapoi la login</a>
          </div>
        </form>
        <div id="alertArea"></div>
      </section>
    </div>

    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script>
      const USERS_KEY = "users";

      function applyThemeFromCookie() {
        const theme = CookieManager.get("theme") || "light";
        document.body.classList.remove("light", "dark");
        document.body.classList.add(theme === "dark" ? "dark" : "light");
      }

      function showAlert(type, message) {
        const el = document.createElement("div");
        el.className = `alert ${type === "error" ? "alert-error" : "alert-success"}`;
        el.textContent = message;
        const area = document.getElementById("alertArea");
        area.innerHTML = "";
        area.appendChild(el);
      }

      function getUsers() {
        const users = StorageManager.getLocal(USERS_KEY);
        return Array.isArray(users) ? users : [];
      }

      function setUsers(users) {
        StorageManager.setLocal(USERS_KEY, users);
      }

      function nextId(users) {
        const maxId = users.reduce((m, u) => Math.max(m, Number(u.id) || 0), 0);
        return maxId + 1;
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      (function init() {
        applyThemeFromCookie();

        document.getElementById("registerForm").addEventListener("submit", (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          const confirm = document.getElementById("confirm").value;

          if (!username || !email || !password || !confirm) {
            showAlert("error", "Toate câmpurile sunt obligatorii.");
            return;
          }
          if (username.length < 3) {
            showAlert("error", "Username trebuie să aibă minim 3 caractere.");
            return;
          }
          if (!isValidEmail(email)) {
            showAlert("error", "Email invalid.");
            return;
          }
          if (password.length < 6) {
            showAlert("error", "Parola trebuie să aibă minim 6 caractere.");
            return;
          }
          if (password !== confirm) {
            showAlert("error", "Parolele nu coincid.");
            return;
          }

          const users = getUsers();
          const usernameTaken = users.some((u) => String(u.username).toLowerCase() === username.toLowerCase());
          if (usernameTaken) {
            showAlert("error", "Username deja folosit.");
            return;
          }
          const emailTaken = users.some((u) => String(u.email).toLowerCase() === email.toLowerCase());
          if (emailTaken) {
            showAlert("error", "Email deja folosit.");
            return;
          }

          users.push({ id: nextId(users), username, email, password });
          setUsers(users);

          showAlert("success", "Cont creat cu succes. Vei fi redirecționat(ă) către login...");
          setTimeout(() => (window.location.href = "login.html"), 1200);
        });
      })();
    </script>
  </body>
</html>
