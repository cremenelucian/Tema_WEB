<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Preferințe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="light">
    <div class="container">
      <header>
        <h1>Preferințe</h1>
        <nav>
          <a href="index.html">Acasă</a>
          <a href="preferences.html">Preferințe</a>
          <a href="cookies-info.html">Cookies info</a>
          <a href="login.html">Autentificare</a>
        </nav>
      </header>

      <section class="card">
        <p class="muted" style="margin-top: 0">
          Setează numele și tema în cookies, iar limba + dimensiunea fontului în localStorage.
        </p>

        <form id="prefsForm" novalidate>
          <div class="two-col">
            <div>
              <label for="username">Nume utilizator</label>
              <input id="username" name="username" type="text" placeholder="ex: Lucia" />
            </div>

            <div>
              <label for="theme">Tema</label>
              <select id="theme" name="theme">
                <option value="light">Luminos</option>
                <option value="dark">Întunecat</option>
              </select>
            </div>

            <div>
              <label for="language">Limba</label>
              <select id="language" name="language">
                <option value="ro">Română</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
              </select>
            </div>

            <div>
              <label for="fontSize">Dimensiune font</label>
              <select id="fontSize" name="fontSize">
                <option value="14px">14px</option>
                <option value="16px">16px</option>
                <option value="18px">18px</option>
                <option value="20px">20px</option>
              </select>
            </div>
          </div>

          <div class="actions">
            <button class="btn" type="submit">Salvează preferințele</button>
            <a class="btn btn-secondary" href="index.html" style="text-decoration: none">Renunță</a>
          </div>
        </form>

        <div id="alertArea"></div>
      </section>
    </div>

    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script>
      function applyThemeFromCookie() {
        const theme = CookieManager.get("theme") || "light";
        document.body.classList.remove("light", "dark");
        document.body.classList.add(theme === "dark" ? "dark" : "light");
      }

      function applyFontFromLocalStorage() {
        const fontSize = StorageManager.getLocal("fontSize");
        if (typeof fontSize === "string" && fontSize.trim()) {
          document.documentElement.style.fontSize = fontSize;
        }
      }

      function showAlert(type, message) {
        const el = document.createElement("div");
        el.className = `alert ${type === "error" ? "alert-error" : "alert-success"}`;
        el.textContent = message;
        const area = document.getElementById("alertArea");
        area.innerHTML = "";
        area.appendChild(el);
      }

      function prefill() {
        document.getElementById("username").value = CookieManager.get("username") || "";
        document.getElementById("theme").value = CookieManager.get("theme") || "light";
        document.getElementById("language").value = StorageManager.getLocal("language") || "ro";
        document.getElementById("fontSize").value = StorageManager.getLocal("fontSize") || "16px";
      }

      (function init() {
        applyThemeFromCookie();
        applyFontFromLocalStorage();
        prefill();

        document.getElementById("prefsForm").addEventListener("submit", function (e) {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const theme = document.getElementById("theme").value;
          const language = document.getElementById("language").value;
          const fontSize = document.getElementById("fontSize").value;

          CookieManager.set("username", username || "Vizitator");
          CookieManager.set("theme", theme);
          StorageManager.setLocal("language", language);
          StorageManager.setLocal("fontSize", fontSize);

          applyThemeFromCookie();
          applyFontFromLocalStorage();

          showAlert("success", "Preferințe salvate. Vei fi redirecționat(ă) către pagina principală...");
          setTimeout(() => (window.location.href = "index.html"), 1200);
        });
      })();
    </script>
  </body>
</html>
