<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="light">
    <div class="container">
      <header>
        <h1>Autentificare</h1>
        <nav>
          <a href="index.html">Acasă</a>
          <a href="preferences.html">Preferințe</a>
          <a href="cookies-info.html">Cookies info</a>
          <a href="login.html">Autentificare</a>
        </nav>
      </header>

      <section class="card">
        <form id="loginForm" novalidate>
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" />

          <label for="password">Parolă</label>
          <input id="password" name="password" type="password" autocomplete="current-password" />

          <label style="display: flex; gap: 10px; align-items: center; margin-top: 12px">
            <input id="remember" type="checkbox" style="width: auto" />
            Ține-mă minte
          </label>

          <div class="actions">
            <button class="btn" type="submit">Intră</button>
            <a class="btn btn-secondary" href="register.html" style="text-decoration: none">Creează cont</a>
          </div>
        </form>

        <div id="alertArea"></div>
        <p class="muted" style="margin-bottom: 0">
          Utilizatori de test: <code>admin/password</code>, <code>student/student123</code>
        </p>
      </section>
    </div>

    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script>
      const USERS_KEY = "users";
      const SESSION_KEY = "session";
      const REMEMBER_KEY = "rememberedUsername";

      function applyThemeFromCookie() {
        const theme = CookieManager.get("theme") || "light";
        document.body.classList.remove("light", "dark");
        document.body.classList.add(theme === "dark" ? "dark" : "light");
      }

      function showAlert(type, message) {
        const el = document.createElement("div");
        el.className = `alert ${type === "error" ? "alert-error" : "alert-success"}`;
        el.textContent = message;
        const area = document.getElementById("alertArea");
        area.innerHTML = "";
        area.appendChild(el);
      }

      function randomId() {
        return Math.random().toString(16).slice(2) + "-" + Date.now().toString(16);
      }

      function getUsers() {
        const users = StorageManager.getLocal(USERS_KEY);
        return Array.isArray(users) ? users : [];
      }

      function ensureDefaultUsers() {
        const existing = StorageManager.getLocal(USERS_KEY);
        if (Array.isArray(existing) && existing.length) return;

        const defaultUsers = [
          { id: 1, username: "admin", password: "password", email: "admin@example.com" },
          { id: 2, username: "student", password: "student123", email: "student@example.com" },
        ];
        StorageManager.setLocal(USERS_KEY, defaultUsers);
      }

      function createSession(user) {
        const session = {
          userId: user.id,
          username: user.username,
          email: user.email,
          loginTime: new Date().toISOString(),
          sessionId: randomId(),
        };
        StorageManager.setSession(SESSION_KEY, session);
      }

      function isLoggedIn() {
        return !!StorageManager.getSession(SESSION_KEY);
      }

      (function init() {
        applyThemeFromCookie();
        ensureDefaultUsers();

        if (isLoggedIn()) {
          window.location.href = "dashboard.html";
          return;
        }

        const remembered = StorageManager.getLocal(REMEMBER_KEY);
        if (typeof remembered === "string" && remembered.trim()) {
          document.getElementById("username").value = remembered;
          document.getElementById("remember").checked = true;
        }

        document.getElementById("loginForm").addEventListener("submit", (e) => {
          e.preventDefault();
          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;
          const remember = document.getElementById("remember").checked;

          if (!username || !password) {
            showAlert("error", "Completează username și parola.");
            return;
          }

          const user = getUsers().find((u) => u.username === username && u.password === password);
          if (!user) {
            showAlert("error", "Username sau parolă incorecte.");
            return;
          }

          if (remember) StorageManager.setLocal(REMEMBER_KEY, username);
          else StorageManager.removeLocal(REMEMBER_KEY);

          createSession(user);
          window.location.href = "dashboard.html";
        });
      })();
    </script>
  </body>
</html>
