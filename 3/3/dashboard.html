<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="light">
    <div class="container">
      <header>
        <h1>Dashboard</h1>
        <nav>
          <a href="index.html">Acasă</a>
          <a href="cart.html">Coș</a>
          <a href="preferences.html">Preferințe</a>
          <a href="cookies-info.html">Cookies info</a>
        </nav>
      </header>

      <section class="card">
        <div class="row">
          <div>
            <div style="font-weight: 800; font-size: 18px" id="userLine"></div>
            <div class="muted">Durata sesiunii: <b id="duration">0s</b></div>
          </div>
          <div class="actions" style="margin-top: 0">
            <a class="btn btn-secondary" href="dashboard.html" target="_blank" rel="noreferrer" style="text-decoration: none">
              Deschide în tab nou
            </a>
            <button class="btn btn-danger" id="logoutBtn" type="button">Deconectare</button>
          </div>
        </div>

        <div class="grid" style="margin-top: 14px">
          <div>
            <table>
              <thead>
                <tr>
                  <th>Câmp</th>
                  <th>Valoare</th>
                </tr>
              </thead>
              <tbody id="sessionTable"></tbody>
            </table>
          </div>

          <div>
            <div class="muted"><b>Date brute sessionStorage (debug)</b></div>
            <pre id="rawSession"></pre>
          </div>
        </div>
      </section>
    </div>

    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script>
      const SESSION_KEY = "session";

      function applyThemeFromCookie() {
        const theme = CookieManager.get("theme") || "light";
        document.body.classList.remove("light", "dark");
        document.body.classList.add(theme === "dark" ? "dark" : "light");
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatDuration(seconds) {
        const s = Math.max(0, Math.floor(seconds));
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if (h) return `${h}h ${m}m ${sec}s`;
        if (m) return `${m}m ${sec}s`;
        return `${sec}s`;
      }

      function requireSession() {
        const session = StorageManager.getSession(SESSION_KEY);
        if (!session) {
          window.location.href = "login.html";
          return null;
        }
        return session;
      }

      function refreshDebugRaw() {
        const all = StorageManager.getAllSession();
        document.getElementById("rawSession").textContent = JSON.stringify(all, null, 2) || "{}";
      }

      (function init() {
        applyThemeFromCookie();
        const session = requireSession();
        if (!session) return;

        document.getElementById("userLine").textContent = `Salut, ${session.username}!`;

        const rows = [
          ["ID Sesiune", session.sessionId],
          ["Username", session.username],
          ["Email", session.email],
          ["Ora autentificării", session.loginTime],
        ];
        document.getElementById("sessionTable").innerHTML = rows
          .map(([k, v]) => `<tr><td><b>${escapeHtml(k)}</b></td><td>${escapeHtml(v ?? "")}</td></tr>`)
          .join("");

        const start = Date.parse(session.loginTime);
        const startMs = Number.isFinite(start) ? start : Date.now();

        function tick() {
          const seconds = (Date.now() - startMs) / 1000;
          document.getElementById("duration").textContent = formatDuration(seconds);
        }
        tick();
        setInterval(tick, 1000);

        refreshDebugRaw();

        document.getElementById("logoutBtn").addEventListener("click", () => {
          StorageManager.removeSession(SESSION_KEY);
          window.location.href = "login.html";
        });
      })();
    </script>
  </body>
</html>
